    *,

  <script>
    (function () {
      var RELOAD_KEY = 'admin-chunk-reload-at';
      var RELOAD_WINDOW_MS = 15000;
      var errorPattern = /Failed to fetch dynamically imported module|Importing a module script failed|Unable to preload CSS/i;

      function shouldRecover(err) {
        var message = String((err && err.message) || err || '');
        return errorPattern.test(message);
      }

      function reloadOnce() {
        try {
          var last = Number(window.sessionStorage.getItem(RELOAD_KEY) || 0);
          var now = Date.now();
          if (last && now - last < RELOAD_WINDOW_MS) return;
          window.sessionStorage.setItem(RELOAD_KEY, String(now));
        } catch (_) {}

        var url = new URL(window.location.href);
        url.searchParams.delete('v');
        window.location.replace(url.toString());
      }

      window.addEventListener('error', function (event) {
        if (shouldRecover((event && event.error) || (event && event.message))) {
          reloadOnce();
        }
      }, true);

      window.addEventListener('unhandledrejection', function (event) {
        if (shouldRecover(event && event.reason)) {
          if (event && typeof event.preventDefault === 'function') event.preventDefault();
          reloadOnce();
        }
      });
    })();
  </script>
