version: '3.8'

services:
  app:
    build:
      context: ..          # 项目根目录为构建上下文
      dockerfile: docker/Dockerfile
    container_name: s2b2c_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ../backend/.env
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: s2b2c_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: s2b2c_db
      MYSQL_USER: s2b2c_user
      MYSQL_PASSWORD: s2b2c_pass
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/seeds:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
